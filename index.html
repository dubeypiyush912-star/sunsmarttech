<!DOCTYPE html>
<html>
<head>
<title>Sunsmarttech Solar Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin:0;
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
}

.hero {
padding:60px 20px;
background:linear-gradient(to right,#000428,#004e92);
}

.container {
padding:30px 20px;
}

input {
padding:12px;
width:250px;
border:none;
border-radius:5px;
margin-top:10px;
}

button {
padding:12px 20px;
margin-top:15px;
background:#00c853;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result-box {
margin-top:20px;
background:white;
color:black;
padding:15px;
border-radius:10px;
display:inline-block;
}

.section {
margin-top:40px;
}

.whatsapp {
background:#25D366;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>☀️ Sunsmarttech</h1>
<h2>Instant Solar Quotation</h2>
<p>Save electricity bill & switch to solar ⚡</p>
</div>

<!-- CALCULATOR -->
<div class="container">

<input type="number" id="bill" placeholder="Enter Monthly Bill (₹)"><br>

<button onclick="calc()">Get Instant Quote</button>

<div id="result"></div>

<a id="waLink" href="#" target="_blank">
<button class="whatsapp">Chat on WhatsApp</button>
</a>

</div>

<!-- SAVINGS -->
<div class="section">
<h2>💰 Your Savings</h2>
<p id="savings"></p>
</div>

<!-- SUBSIDY -->
<div class="section">
<h2>🇮🇳 Government Subsidy</h2>
<p>Up to ₹78,000 subsidy available on rooftop solar*</p>
</div>

<!-- WHY US -->
<div class="section">
<h2>Why Choose Us?</h2>
<p>✔ Trusted Solar Experts</p>
<p>✔ Best Price Guarantee</p>
<p>✔ Fast Installation</p>
</div>

<script>
function calc(){
 let bill = document.getElementById("bill").value;

 if(bill==""){
  alert("Enter bill first");
  return;
 }

 let system = bill / 1000;
 let price = system * 60000;

 let yearlySave = bill * 12;
 let saving25yr = yearlySave * 25;

 let message = "Hello, my bill is ₹" + bill + ". Please share solar details.";

 document.getElementById("result").innerHTML =
 "<div class='result-box'>⚡ System: " + system.toFixed(1) + " kW <br> 💰 Cost: ₹" + price.toLocaleString() + "</div>";

 document.getElementById("savings").innerHTML =
 "Monthly Bill: ₹" + bill + "<br> Yearly Saving: ₹" + yearlySave.toLocaleString() + "<br> 25 Year Saving: ₹" + saving25yr.toLocaleString();

 document.getElementById("waLink").href =
 "https://wa.me/919236614331?text=" + encodeURIComponent(message);
}
</script>

</body>
</html>
