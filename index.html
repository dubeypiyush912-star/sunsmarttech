<!DOCTYPE html>
<html>
<head>
  <title>Sunsmarttech Solar Quote</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      text-align:center;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color:white;
    }

    .container {
      padding:50px 20px;
    }

    input {
      padding:12px;
      width:250px;
      border:none;
      border-radius:5px;
      margin-top:10px;
    }

    button {
      padding:12px 20px;
      margin-top:15px;
      background:#00c853;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover {
      background:#009624;
    }

    .box {
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
    }

    .whatsapp {
      margin-top:20px;
      background:#25D366;
    }
  </style>
</head>

<body>

<div class="container">

<h1>☀️ Sunsmarttech</h1>
<h2>Instant Solar Quotation</h2>

<p>Get accurate solar price in seconds ⚡</p>

<input type="number" id="bill" placeholder="Enter Monthly Bill (₹)"><br>

<button onclick="calc()">Get Instant Quote</button>

<div class="box" id="result"></div>

<a href="https://wa.me/919236614331" target="_blank">
<button class="whatsapp">Chat on WhatsApp</button>
</a>

</div>

<script>
function calc(){
 let bill = document.getElementById("bill").value;

 if(bill==""){
  alert("Enter bill first");
  return;
 }

 let system = bill / 1000;
 let price = system * 60000;

 document.getElementById("result").innerHTML =
 "⚡ System Size: " + system.toFixed(1) + " kW <br> 💰 Estimated Cost: ₹" + price.toLocaleString();
}
</script>

</body>
</html>
