<!DOCTYPE html>
<html>
<head>
<title>Sunsmarttech Solar Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin:0;
font-family:Arial;
text-align:center;
background: linear-gradient(to right, #141e30, #243b55);
color:white;
}

.container {
padding:40px 20px;
}

input {
padding:12px;
width:250px;
border:none;
border-radius:5px;
margin-top:10px;
}

button {
padding:12px 20px;
margin-top:15px;
background:#00c853;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result-box {
margin-top:20px;
background:white;
color:black;
padding:15px;
border-radius:10px;
display:inline-block;
}

.whatsapp {
background:#25D366;
}

.section {
margin-top:40px;
}

</style>
</head>

<body>

<div class="container">

<h1>☀️ Sunsmarttech</h1>
<h2>Instant Solar Quotation</h2>

<p>Get accurate solar price in seconds ⚡</p>

<input type="number" id="bill" placeholder="Enter Monthly Bill (₹)"><br>

<button onclick="calc()">Get Instant Quote</button>

<div id="result"></div>

<div class="section">
<a id="waLink" href="#" target="_blank">
<button class="whatsapp">Chat on WhatsApp</button>
</a>
</div>

</div>

<div class="section">
<h2>Why Choose Us?</h2>
<p>✔ Trusted Solar Experts</p>
<p>✔ Best Price Guarantee</p>
<p>✔ Fast Installation</p>
</div>

<script>
function calc(){
 let bill = document.getElementById("bill").value;

 if(bill==""){
  alert("Enter bill first");
  return;
 }

 let system = bill / 1000;
 let price = system * 60000;

 let message = "Hello, my bill is ₹" + bill + ". Please share solar details.";

 document.getElementById("result").innerHTML =
 "<div class='result-box'>⚡ System: " + system.toFixed(1) + " kW <br> 💰 Cost: ₹" + price.toLocaleString() + "</div>";

 document.getElementById("waLink").href =
 "https://wa.me/919236614331?text=" + encodeURIComponent(message);
}
</script>

</body>
</html>
